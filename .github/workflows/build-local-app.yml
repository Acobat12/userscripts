name: Build local macOS app

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Add fallback tag
        run: git tag v4.8.6 || true

      - run: npm run build:mac-safari-15

      - name: Build Xcode app
        run: |
          xcodebuild \
            -project xcode/Userscripts.xcodeproj \
            -scheme Mac \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: Userscripts.app
          path: build/Build/Products/Debug/Userscripts.app
