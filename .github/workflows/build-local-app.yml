name: Build local macOS app

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Add fallback tag
        run: git tag v4.8.6 || true

      - name: Build web assets
        run: npm run build:mac-safari-15

      - name: List Xcode schemes
        run: |
          xcodebuild -list -project xcode/Userscripts.xcodeproj

      - name: Build Xcode app
        run: |
          xcodebuild \
            -project xcode/Userscripts.xcodeproj \
            -scheme Mac \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Show build output
        run: |
          echo "===== BUILD ====="
          find build -maxdepth 6 | sort

          echo
          echo "===== APPS ====="
          find . -name "*.app"

          echo
          echo "===== APPEX ====="
          find . -name "*.appex"

      - name: Upload build directory
        uses: actions/upload-artifact@v4
        with:
          name: BuildProducts
          path: build
