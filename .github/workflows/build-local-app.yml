name: Build local macOS Intel app

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15-intel

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Add fallback tag
        run: git tag v4.8.6 || true

      - name: Build web assets
        run: npm run build:mac-safari-15

      - name: Build Xcode app
        run: |
          xcodebuild \
            -project xcode/Userscripts.xcodeproj \
            -scheme Mac \
            -configuration Debug \
            -derivedDataPath build \
            -destination 'platform=macOS,arch=x86_64' \
            ARCHS=x86_64 \
            ONLY_ACTIVE_ARCH=NO \
            clean build

      - name: Package app
        run: |
          cd build/Build/Products/Debug
          ditto -c -k --sequesterRsrc --keepParent Userscripts-Debug.app Userscripts-Debug-macOS-Intel.zip

      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: Userscripts-Debug-macOS-Intel
          path: build/Build/Products/Debug/Userscripts-Debug-macOS-Intel.zip
